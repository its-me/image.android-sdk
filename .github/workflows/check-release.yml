name: Check for new release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check and tag new release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(curl -s 'https://dl.google.com/android/repository/repository2-3.xml' | grep -oP 'commandlinetools-linux-\K[0-9]+(?=_latest\.zip)' | sort -n | tail -1)
          if ! git ls-remote --exit-code origin "refs/tags/tools-$latest"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "tools-$latest" -m "tools-$latest"
            git push origin "tools-$latest"
            gh workflow run release.yml --ref "tools-$latest"
          fi
