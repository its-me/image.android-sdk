name: "platform: release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Platform version (e.g. 35, 35-ext14, 36.1 or 37.0)'
        required: true

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tags
        run: |
          version="${{ github.event.inputs.version }}"
          {
            echo "tags<<EOF"
            echo "ghcr.io/${{ github.repository }}:${version}"
            if [[ "$version" != *"-ext"* ]]; then
              echo "ghcr.io/${{ github.repository }}:latest"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: ANDROID_PLATFORM_VERSION=${{ github.event.inputs.version }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  tag:
    name: Create git tag
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            -f ref="refs/tags/${{ github.event.inputs.version }}" \
            -f sha="${{ github.sha }}"

  push-dockerhub:
    name: Push to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: |
          version="${{ github.event.inputs.version }}"
          extra_args=""
          if [[ "$version" != *"-ext"* ]]; then
            extra_args="--tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:latest"
          fi
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${version} \
            ${extra_args} \
            ghcr.io/${{ github.repository }}:${version}

  push-quay:
    name: Push to Quay
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          version="${{ github.event.inputs.version }}"
          extra_args=""
          if [[ "$version" != *"-ext"* ]]; then
            extra_args="--tag quay.io/${QUAY_NAMESPACE%%+*}/${{ github.event.repository.name }}:latest"
          fi
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/${{ github.event.repository.name }}:${version} \
            ${extra_args} \
            ghcr.io/${{ github.repository }}:${version}
