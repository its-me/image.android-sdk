name: "build-tools: release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build tools version (e.g. 37.0.0 or 37.0.0-rc1)'
        required: true

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      major_tag: ${{ steps.tags.outputs.major_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tags
        run: |
          version="${{ github.event.inputs.version }}"
          major="${version%%.*}"
          if [[ "$version" == *"-rc"* ]]; then
            rc="${version##*-}"
            echo "major_tag=build-tools-${major}-${rc}" >> $GITHUB_OUTPUT
          else
            echo "major_tag=build-tools-${major}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.build-tools
          build-args: ANDROID_BUILD_TOOLS_VERSION=${{ github.event.inputs.version }}
          outputs: type=image,push=true
          tags: |
            ghcr.io/${{ github.repository }}:build-tools-${{ github.event.inputs.version }}
            ghcr.io/${{ github.repository }}:build-tools
            ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.major_tag }}

  tag:
    name: Create git tag
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            -f ref="refs/tags/build-tools-${{ github.event.inputs.version }}" \
            -f sha="${{ github.sha }}"

  push-dockerhub:
    name: Push to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:build-tools-${{ github.event.inputs.version }} \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:build-tools \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ needs.build.outputs.major_tag }} \
            ghcr.io/${{ github.repository }}:build-tools-${{ github.event.inputs.version }}

  push-quay:
    name: Push to Quay
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/${{ github.event.repository.name }}:build-tools-${{ github.event.inputs.version }} \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/${{ github.event.repository.name }}:build-tools \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/${{ github.event.repository.name }}:${{ needs.build.outputs.major_tag }} \
            ghcr.io/${{ github.repository }}:build-tools-${{ github.event.inputs.version }}
