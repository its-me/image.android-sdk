name: "build-tools: check release"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check and trigger new release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(curl -s 'https://dl.google.com/android/repository/repository2-3.xml' \
            | grep -oP 'build-tools;\K[0-9]+\.[0-9]+\.[0-9]+(?:-rc[0-9]+)?' \
            | sed 's/$/-z/' | sort -uV | tail -1 | sed 's/-z$//')
          if ! git ls-remote --exit-code origin "refs/tags/build-tools-$latest"; then
            gh workflow run release-build-tools.yml -f version="$latest"
          fi
