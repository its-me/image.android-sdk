name: "tools: release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK tools version number'
        required: true

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.tools
          build-args: ANDROID_SDK_TOOLS_VERSION=${{ github.event.inputs.version }}
          push: true
          tags: |
            ghcr.io/its-me/android-sdk:tools-${{ github.event.inputs.version }}
            ghcr.io/its-me/android-sdk:tools

  tag:
    name: Create git tag
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/its-me/android-sdk/git/refs \
            --method POST \
            -f ref="refs/tags/tools-${{ github.event.inputs.version }}" \
            -f sha="${{ github.sha }}"

  push-dockerhub:
    name: Push to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/android-sdk:tools-${{ github.event.inputs.version }} \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/android-sdk:tools \
            ghcr.io/its-me/android-sdk:tools-${{ github.event.inputs.version }}

  push-quay:
    name: Push to Quay
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/android-sdk:tools-${{ github.event.inputs.version }} \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/android-sdk:tools \
            ghcr.io/its-me/android-sdk:tools-${{ github.event.inputs.version }}
